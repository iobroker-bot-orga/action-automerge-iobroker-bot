name: 'Auto-Merge ioBroker-Bot PRs'
description: 'Automatically merge pull requests created by ioBroker-Bot unless explicitly blocked'
author: 'ioBroker Bot Organization'

branding:
  icon: 'git-merge'
  color: 'green'

inputs:
  github-token:
    description: 'GitHub token with permissions to merge PRs'
    required: true

  pull-request-ref:
    description: 'Optional pull request reference (PR number or refs/pull/<number>/head|merge)'
    required: false
    default: ''

  merge-method:
    description: 'Merge method to use (merge, squash, or rebase)'
    required: false
    default: 'merge'

  wait-for-checks:
    description: 'Wait for other checks to complete before merging'
    required: false
    default: 'true'

  max-wait-time:
    description: 'Maximum time to wait for checks in seconds'
    required: false
    default: '3600'

  poll-interval-seconds:
    description: 'Polling interval in seconds while waiting for checks'
    required: false
    default: '45'

  initial-check-delay-seconds:
    description: 'Initial delay before evaluating whether checks exist'
    required: false
    default: '10'

  mergeable-max-wait-time:
    description: 'Maximum time in seconds to wait for GitHub to compute PR mergeability'
    required: false
    default: '600'

  mergeable-poll-interval-seconds:
    description: 'Polling interval in seconds while waiting for PR mergeability'
    required: false
    default: '15'

outputs:
  should-merge:
    description: 'Whether the PR should be merged'
    value: ${{ steps.should-merge.outputs.should_merge }}

  match-reason:
    description: 'Reason for the merge decision'
    value: ${{ steps.should-merge.outputs.match_reason }}

  checks-passed:
    description: 'Whether all CI checks passed'
    value: ${{ steps.wait-for-checks.outputs.checks_passed || steps.skip-checks.outputs.checks_passed }}

runs:
  using: 'composite'
  steps:
    - name: Resolve pull request reference
      id: resolve-pr
      uses: actions/github-script@v9
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const pullRequestRef = '${{ inputs.pull-request-ref }}'.trim();
          let prNumber = context.payload.pull_request?.number;

          if (!prNumber && pullRequestRef) {
            if (/^\d+$/.test(pullRequestRef)) {
              prNumber = Number(pullRequestRef);
            } else {
              const refMatch = pullRequestRef.match(/^refs\/pull\/(\d+)\/(head|merge)$/);
              if (refMatch) {
                prNumber = Number(refMatch[1]);
              }
            }
          }

          if (!prNumber) {
            core.setFailed('No pull request context found. Provide inputs.pull-request-ref or run on a pull_request event.');
            return;
          }

          const { data: pr } = await github.rest.pulls.get({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: prNumber,
          });

          core.info(`Using PR #${pr.number}`);
          core.setOutput('pr_number', String(pr.number));
          core.setOutput('head_sha', pr.head.sha);

    - name: Decide if should auto-merge
      id: should-merge
      uses: actions/github-script@v9
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const prNumber = Number('${{ steps.resolve-pr.outputs.pr_number }}');

          const { data: pr } = await github.rest.pulls.get({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: prNumber,
          });

          const authorLogin = pr.user?.login ?? '';
          const body = pr.body ?? '';

          let shouldMerge = false;
          let matchReason = '';

          if (pr.state !== 'open') {
            matchReason = `PR is not open (state: ${pr.state})`;
          } else if (authorLogin !== 'ioBroker-Bot') {
            matchReason = `PR author ${authorLogin} is not ioBroker-Bot`;
          } else if (/do not automerge/i.test(body)) {
            matchReason = 'PR description contains "do not automerge"';
          } else {
            shouldMerge = true;
            matchReason = 'PR was created by ioBroker-Bot and no block phrase was found';
          }

          core.info(`Decision: ${shouldMerge ? 'merge' : 'skip'} (${matchReason})`);
          core.setOutput('should_merge', String(shouldMerge));
          core.setOutput('match_reason', matchReason);

    - name: Wait for other workflows
      if: |
        steps.should-merge.outputs.should_merge == 'true' &&
        inputs.wait-for-checks == 'true'
      id: wait-for-checks
      uses: actions/github-script@v9
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const prNumber = Number('${{ steps.resolve-pr.outputs.pr_number }}');
          const headSha = '${{ steps.resolve-pr.outputs.head_sha }}';

          const isSuccessfulConclusion = (conclusion) => {
            return conclusion === 'success' || conclusion === 'skipped' || conclusion === 'neutral';
          };
          const getCheckIcon = (check) => {
            if (check.status !== 'completed') return '⏳';
            return isSuccessfulConclusion(check.conclusion) ? '✅' : '❌';
          };

          const maxWaitTime = Number('${{ inputs.max-wait-time }}') * 1000;
          const pollInterval = Number('${{ inputs.poll-interval-seconds }}') * 1000;
          const initialDelay = Number('${{ inputs.initial-check-delay-seconds }}') * 1000;
          const startTime = Date.now();
          let hasWaitedInitialDelay = false;
          let checksPassed = false;
          let otherChecks = [];
          let attempt = 0;

          core.info('='.repeat(80));
          core.info('⏳ WAITING FOR CI CHECKS');
          core.info(`PR: #${prNumber}`);
          core.info(`Commit SHA: ${headSha}`);
          core.info(`Timeout: ${Math.floor(maxWaitTime / 1000)}s, Poll interval: ${Math.floor(pollInterval / 1000)}s`);
          core.info('='.repeat(80));

          while (Date.now() - startTime < maxWaitTime) {
            attempt += 1;
            const { data: currentPR } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            if (currentPR.state !== 'open') {
              core.info(`⚠️  PR #${prNumber} is no longer open (state: ${currentPR.state}). Stopping check wait.`);
              break;
            }

            const { data: checkRuns } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: headSha,
              per_page: 100,
            });

            const currentRunUrlPart = `/actions/runs/${context.runId}`;
            otherChecks = checkRuns.check_runs.filter((check) => {
              return !(check.details_url || '').includes(currentRunUrlPart);
            });

            core.info(`🔎 Attempt ${attempt}: found ${otherChecks.length} other check(s).`);

            if (otherChecks.length === 0) {
              if (!hasWaitedInitialDelay && initialDelay > 0) {
                hasWaitedInitialDelay = true;
                core.info(`⏱️  No checks found yet. Waiting initial ${Math.floor(initialDelay / 1000)}s before re-checking...`);
                await new Promise((resolve) => setTimeout(resolve, initialDelay));
                continue;
              }
              core.info('✅ No other checks to wait for.');
              checksPassed = true;
              break;
            }

            const pending = otherChecks.filter((check) => check.status !== 'completed');
            const failed = otherChecks.filter((check) => check.status === 'completed' && !isSuccessfulConclusion(check.conclusion));
            const successful = otherChecks.filter((check) => check.status === 'completed' && isSuccessfulConclusion(check.conclusion));

            core.info(`📊 Status: ${successful.length} successful, ${pending.length} pending, ${failed.length} failed`);

            if (failed.length > 0) {
              core.info('❌ Failed checks detected:');
              failed.forEach((check) => {
                core.info(`  ${getCheckIcon(check)} ${check.name}: ${check.conclusion ?? check.status} (${check.html_url})`);
              });
              throw new Error(`${failed.length} check(s) failed - cannot automerge`);
            }

            if (pending.length === 0) {
              core.info('✅ All checks completed successfully:');
              otherChecks.forEach((check) => {
                core.info(`  ${getCheckIcon(check)} ${check.name}: ${check.conclusion ?? check.status}`);
              });
              checksPassed = true;
              break;
            }

            core.info(`⏳ Waiting for ${pending.length} pending check(s):`);
            pending.forEach((check) => {
              core.info(`  ${getCheckIcon(check)} ${check.name}: ${check.status}`);
            });
            core.info(`↻ Polling again in ${Math.floor(pollInterval / 1000)}s...`);
            await new Promise((resolve) => setTimeout(resolve, pollInterval));
          }

          if (checksPassed) {
            core.info('✅ Check wait phase completed successfully.');
            core.setOutput('checks_passed', 'true');
          } else if (Date.now() - startTime >= maxWaitTime) {
            core.info('⏱️  Timeout reached while waiting for checks.');
            if (otherChecks.length > 0) {
              core.info('Last known check states:');
              otherChecks.forEach((check) => {
                core.info(`  ${getCheckIcon(check)} ${check.name}: ${check.conclusion ?? check.status}`);
              });
            }
            throw new Error('Timeout waiting for checks to complete');
          } else {
            core.setOutput('checks_passed', 'false');
          }

    - name: Set checks passed when not waiting
      if: |
        steps.should-merge.outputs.should_merge == 'true' &&
        inputs.wait-for-checks != 'true'
      id: skip-checks
      shell: bash
      run: |
        echo "checks_passed=true" >> "$GITHUB_OUTPUT"

    - name: Merge PR
      if: |
        steps.should-merge.outputs.should_merge == 'true' &&
        (steps.wait-for-checks.outputs.checks_passed == 'true' || steps.skip-checks.outputs.checks_passed == 'true')
      uses: actions/github-script@v9
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const prNumber = Number('${{ steps.resolve-pr.outputs.pr_number }}');
          const mergeMethod = '${{ inputs.merge-method }}';

          const { data: pr } = await github.rest.pulls.get({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: prNumber,
          });

          const maxMergeableWaitMs = Number('${{ inputs.mergeable-max-wait-time }}') * 1000;
          const mergeablePollIntervalMs = Number('${{ inputs.mergeable-poll-interval-seconds }}') * 1000;
          const mergeableWaitStart = Date.now();

          if (pr.mergeable === null) {
            core.info(`⏳ PR mergeability is still being computed. Waiting up to ${Math.floor(maxMergeableWaitMs / 1000)}s...`);
          }
          while (pr.mergeable === null && (Date.now() - mergeableWaitStart) < maxMergeableWaitMs) {
            await new Promise((resolve) => setTimeout(resolve, mergeablePollIntervalMs));
            const refreshed = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            pr.mergeable = refreshed.data.mergeable;
            pr.state = refreshed.data.state;
            const elapsed = Math.floor((Date.now() - mergeableWaitStart) / 1000);
            core.info(`🔄 Mergeability check after ${elapsed}s: mergeable=${pr.mergeable}, state=${pr.state}`);
          }

          if (pr.state !== 'open') {
            core.info(`PR #${prNumber} is no longer open (state: ${pr.state}).`);
            return;
          }

          if (pr.mergeable !== true) {
            core.setFailed(`PR is not mergeable (mergeable=${pr.mergeable}).`);
            return;
          }

          const mergeMethodToAutoMergeMethod = {
            merge: 'MERGE',
            squash: 'SQUASH',
            rebase: 'REBASE',
          };

          try {
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              merge_method: mergeMethod,
            });

            core.info(`Successfully merged PR #${prNumber} using ${mergeMethod}.`);
          } catch (error) {
            if (error.status === 403) {
              core.warning(
                'Direct merge failed with 403 (Resource not accessible by integration). ' +
                'Trying to enable auto-merge as a fallback.'
              );

              try {
                await github.graphql(
                  `mutation EnableAutoMerge($pullRequestId: ID!, $mergeMethod: PullRequestMergeMethod!) {
                    enablePullRequestAutoMerge(input: { pullRequestId: $pullRequestId, mergeMethod: $mergeMethod }) {
                      pullRequest {
                        number
                      }
                    }
                  }`,
                  {
                    pullRequestId: pr.node_id,
                    mergeMethod: mergeMethodToAutoMergeMethod[mergeMethod] ?? 'MERGE',
                  }
                );

                core.info(`Enabled auto-merge for PR #${prNumber} using ${mergeMethod}.`);
                return;
              } catch (autoMergeError) {
                core.setFailed(
                  'Direct merge was denied (403) and enabling auto-merge failed. ' +
                  'Ensure the workflow token can write contents or provide a PAT via input github-token. ' +
                  `Fallback error: ${autoMergeError.message}`
                );
                return;
              }
            }

            throw error;
          }
